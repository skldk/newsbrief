<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBrief — Ведомости / Новости</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --text: #1D1D1F;
            --sub: #6E6E73;
            --accent: #007AFF;
            --divider: #E5E5EA;
            --tag-bg: #F2F2F7;
            --tag-fg: #515154;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --radius: 20px;
            --skeleton: #E5E5EA;
            --shimmer-to: #D1D1D6;
            --header-bg: rgba(245,245,247,0.82);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1C1C1E;
                --card: #2C2C2E;
                --text: #F5F5F7;
                --sub: #98989D;
                --divider: #3A3A3C;
                --tag-bg: #3A3A3C;
                --tag-fg: #AEAEB2;
                --shadow: 0 1px 3px rgba(0,0,0,0.3);
                --skeleton: #3A3A3C;
                --shimmer-to: #545458;
                --header-bg: rgba(28,28,30,0.82);
                --accent: #0A84FF;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            position: sticky; top: 0; z-index: 10;
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--divider);
            padding: 12px 16px;
        }

        .header-inner {
            max-width: 720px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }

        .logo { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
        .logo span { color: var(--accent); }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .header-toggle {
            background: none; border: 0.5px solid var(--divider);
            color: var(--sub); font-size: 12px; font-family: inherit;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            min-height: 36px;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
            white-space: nowrap;
        }
        .header-toggle:hover { background: var(--tag-bg); color: var(--text); }
        .header-toggle.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .header-source { font-size: 12px; color: var(--sub); background: var(--tag-bg); padding: 3px 10px; border-radius: 6px; }
        .header-source.hidden { visibility: hidden; }
        .header-date { font-size: 13px; color: var(--sub); }

        /* ── Main ───────────────────────────────────────────── */
        .main { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }

        /* ── Card ───────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            animation: cardAppear 0.4s cubic-bezier(0.25, 1, 0.5, 1) both;
            border: 0.5px solid var(--divider);
        }
        .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card:active { transform: scale(0.995); }
        .card:focus { outline: none; }
        .card:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        @media (prefers-color-scheme: dark) {
            .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        }

        .card-row { display: flex; gap: 16px; align-items: flex-start; }

        .card-image {
            width: 72px; min-width: 72px; height: 72px; border-radius: 10px;
            background: var(--divider);
            flex-shrink: 0;
            object-fit: cover;
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            color: var(--sub);
        }

        .card-body { flex: 1; min-width: 0; }

        .card-title {
            font-size: 16px; font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
            word-break: break-word; overflow-wrap: break-word;
        }

        .card-summary {
            font-size: 13px; color: var(--sub);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 11px; color: var(--sub);
            display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
        }

        /* ── Emotion badge (minimal) ────────────────────────── */
        .emotion-badge {
            display: inline-block; vertical-align: middle;
            font-size: 10px; font-weight: 600; letter-spacing: 0.1px;
            padding: 2px 8px; border-radius: 6px;
            margin-left: 8px;
            cursor: help;
            transition: opacity 0.2s;
        }

        /* ── Card external link indicator ───────────────────── */
        .card-external { display: inline; }

        /* ── Card read link ──────────────────────────────────── */
        .card-read {
            display: inline-block; margin-top: 8px;
            font-size: 12px; font-weight: 600; color: var(--accent);
            text-decoration: none;
        }
        .card-read:hover { text-decoration: underline; }

        /* ── Favorite button ───────────────────────────────── */
        .fav-btn {
            background: none; border: none; cursor: pointer;
            font-size: 15px; padding: 2px; line-height: 1;
            opacity: 0.8; transition: opacity 0.2s cubic-bezier(0.25, 1, 0.5, 1), transform 0.2s cubic-bezier(0.25, 1, 0.5, 1), color 0.2s cubic-bezier(0.25, 1, 0.5, 1);
            vertical-align: middle; color: var(--sub);
        }
        .fav-btn:hover { transform: scale(1.2); opacity: 1; color: var(--accent); }
        .fav-btn.active { opacity: 1; color: var(--accent); }
        .fav-btn:active { transform: scale(0.9); }

        /* ── Skeleton loading ───────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: calc(200px + 100%) 0; }
        }
        .skeleton .sk-img { width: 72px; height: 72px; border-radius: 10px; background: var(--skeleton); }
        .skeleton .sk-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }
        .skeleton .sk-line.wide { width: 70%; }
        .skeleton .sk-line.medium { width: 50%; }
        .skeleton .sk-line.narrow { width: 30%; }
        .skeleton .sk-img, .skeleton .sk-line { background: linear-gradient(90deg, var(--skeleton) 25%, var(--shimmer-to) 50%, var(--skeleton) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @media (prefers-reduced-motion: reduce) {
            .skeleton .sk-img, .skeleton .sk-line { animation: none; }
        }

        /* ── Empty / Error ──────────────────────────────────── */
        .state { text-align: center; padding: 80px 20px; color: var(--sub); }
        .state-icon { font-size: 44px; margin-bottom: 12px; }
        .state-text { font-size: 15px; margin-bottom: 8px; }
        .state-retry { color: var(--accent); cursor: pointer; font-size: 14px; font-weight: 600; }
        .state-retry:hover { text-decoration: underline; }

        /* ── Card appear animation ──────────────────────────── */
        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Footer ─────────────────────────────────────────── */
        .footer { max-width: 720px; margin: 0 auto; text-align: center; padding: 24px 16px 40px; color: var(--sub); font-size: 11px; }
        .footer a { color: var(--accent); text-decoration: none; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 640px) {
            .header { padding: 10px 14px; }
            .main { padding: 20px 14px 40px; }
            .card { padding: 18px; }
            .card-image { width: 64px; min-width: 64px; height: 64px; font-size: 24px; }
            .card-title { font-size: 15px; }
        }

        @media (max-width: 480px) {
            .header { padding: 12px 16px; }
            .main { padding: 16px 16px 40px; }
            .card { padding: 16px; border-radius: 16px; }
            .card-image { width: 56px; min-width: 56px; height: 56px; font-size: 22px; }
            .card-title { font-size: 14px; }
        }

        /* ── Print ──────────────────────────────────────────── */
        @media print {
            .header { position: static; backdrop-filter: none; -webkit-backdrop-filter: none; }
            .card { box-shadow: none; break-inside: avoid; border: 1px solid #ddd; }
            .fav-btn, .card-read { display: none; }
            body { background: #fff; color: #000; }
            .footer { color: #666; }
        }

        /* ── Auth Modal ──────────────────────────────────────── */
        .modal-overlay {
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            align-items: center; justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--card); border-radius: 20px;
            padding: 32px; width: 360px; max-width: 90vw;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            animation: cardAppear 0.3s cubic-bezier(0.25, 1, 0.5, 1) both;
        }
        .modal h2 { font-size: 20px; font-weight: 700; margin-bottom: 24px; text-align: center; }
        .modal label { display: block; font-size: 12px; color: var(--sub); margin-bottom: 4px; }
        .modal input {
            width: 100%; padding: 10px 14px; border: 0.5px solid var(--divider);
            border-radius: 10px; font-size: 15px; margin-bottom: 16px;
            background: var(--bg); color: var(--text); outline: none;
            font-family: inherit; transition: border-color 0.2s;
        }
        .modal input:focus { border-color: var(--accent); }
        .modal .btn-primary {
            width: 100%; padding: 12px; border: none; border-radius: 12px;
            background: var(--accent); color: #fff; font-size: 15px;
            font-weight: 600; cursor: pointer; font-family: inherit;
            transition: opacity 0.2s; margin-bottom: 8px;
        }
        .modal .btn-primary:hover { opacity: 0.85; }
        .modal .btn-text {
            background: none; border: none; color: var(--accent);
            font-size: 13px; cursor: pointer; text-align: center;
            width: 100%; font-family: inherit;
        }
        .modal .error-msg { color: #FF3B30; font-size: 12px; text-align: center; margin-bottom: 12px; display: none; }
        .pass-wrap { position: relative; }
        .pass-wrap input { padding-right: 36px; }
        .pass-toggle {
            position: absolute; right: 6px; top: 50%; transform: translateY(-65%);
            background: none; border: none; cursor: pointer; padding: 6px;
            color: var(--sub); border-radius: 6px;
            transition: color 0.15s, background 0.15s;
            display: flex; align-items: center; justify-content: center;
            line-height: 0;
        }
        .pass-toggle:hover { color: var(--text); background: var(--tag-bg); }
        .pass-toggle:active { transform: translateY(-65%) scale(0.92); }
        .pass-slash { transition: opacity 0.15s; }
        .pass-toggle.show .pass-slash { opacity: 0; }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">News<span>Brief</span></div>
        <div class="header-right">
            <button id="favToggle" class="header-toggle" aria-pressed="false">☆ Избранное</button>
            <button id="authBtn" class="header-toggle" onclick="showAuthModal()">👤 Войти</button>
            <span class="header-source" id="headerSource">Ведомости · Новости</span>
            <span class="header-date" id="headerDate"></span>
        </div>
    </div>
</header>

<main class="main" id="newsList">
    <noscript>
        <div class="state">
            <div class="state-icon">📰</div>
            <p class="state-text">Для работы NewsBrief требуется JavaScript</p>
            <a class="state-retry" href="https://www.vedomosti.ru/rss/rubric/finance/markets" target="_blank" rel="noopener">Открыть RSS Ведомостей напрямую ↗</a>
        </div>
    </noscript>
</main>

<footer class="footer">
    Данные из <a href="https://www.vedomosti.ru/rss/news" target="_blank" rel="noopener">RSS Ведомости</a> · обновляется при загрузке
</footer>

<!-- Auth Modal -->
<div class="modal-overlay" id="authOverlay" onclick="if(event.target===this)hideAuthModal()">
    <div class="modal" id="authModal">
        <h2 id="authTitle">Вход</h2>
        <div class="error-msg" id="authError"></div>
        <label for="authEmail">Email</label>
        <input type="email" id="authEmail" placeholder="you@example.com" autocomplete="email">
        <label for="authPass">Пароль</label>
        <div class="pass-wrap">
            <input type="password" id="authPass" placeholder="Минимум 4 символа" autocomplete="current-password">
            <button type="button" class="pass-toggle" id="passToggle" onclick="togglePassVisibility()" aria-label="Показать пароль">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 10s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
                    <circle cx="10" cy="10" r="2.5"/>
                    <line x1="3" y1="17" x2="17" y2="3" class="pass-slash"/>
                </svg>
            </button>
        </div>
        <button class="btn-primary" id="authSubmit">Войти</button>
        <button class="btn-primary" id="yandexBtn" style="background:#FC3F1D;margin-bottom:12px" onclick="loginYandex()">🚀 Войти через Яндекс ID</button>
        <button class="btn-text" id="authSwitch">Создать аккаунт</button>
    </div>
</div>

<script>
// ── Header date ──────────────────────────────────────────────
const now = new Date();
const months = ['января','февраля','марта','апреля','мая','июня',
                'июля','августа','сентября','октября','ноября','декабря'];
document.getElementById('headerDate').textContent =
    `${now.getDate()} ${months[now.getMonth()]}, ${now.getFullYear()}`;

// ── Auth ──────────────────────────────────────────────────────
let authMode = 'login'; // 'login' | 'register'
let currentUser = null;

const authOverlay = document.getElementById('authOverlay');
const authTitle = document.getElementById('authTitle');
const authEmail = document.getElementById('authEmail');
const authPass = document.getElementById('authPass');
const authSubmit = document.getElementById('authSubmit');
const authSwitch = document.getElementById('authSwitch');
const authError = document.getElementById('authError');
const authBtn = document.getElementById('authBtn');

function showAuthModal() {
    if (currentUser) {
        logout();
        return;
    }
    authMode = 'login';
    authTitle.textContent = 'Вход';
    authSubmit.textContent = 'Войти';
    authSubmit.disabled = false;
    authSwitch.textContent = 'Создать аккаунт';
    authError.style.display = 'none';
    authEmail.value = ''; authPass.value = '';
    authPass.type = 'password';
    document.getElementById('passToggle').classList.remove('show');
    authOverlay.classList.add('active');
    setTimeout(() => authEmail.focus(), 100);
}

function hideAuthModal() { authOverlay.classList.remove('active'); }

function togglePassVisibility() {
    const pass = document.getElementById('authPass');
    const btn = document.getElementById('passToggle');
    if (pass.type === 'password') {
        pass.type = 'text';
        btn.classList.add('show');
        btn.setAttribute('aria-label', 'Скрыть пароль');
    } else {
        pass.type = 'password';
        btn.classList.remove('show');
        btn.setAttribute('aria-label', 'Показать пароль');
    }
}

authSwitch.addEventListener('click', () => {
    authMode = authMode === 'login' ? 'register' : 'login';
    authTitle.textContent = authMode === 'login' ? 'Вход' : 'Регистрация';
    authSubmit.textContent = authMode === 'login' ? 'Войти' : 'Зарегистрироваться';
    authSwitch.textContent = authMode === 'login' ? 'Создать аккаунт' : 'Уже есть аккаунт';
    authError.style.display = 'none';
});

authSubmit.addEventListener('click', async () => {
    if (authSubmit.disabled) return;
    const email = authEmail.value.trim();
    const password = authPass.value;
    if (!email || !password) {
        authError.textContent = 'Заполните все поля';
        authError.style.display = 'block';
        return;
    }
    const url = authMode === 'login' ? '/api/auth/login' : '/api/auth/register';
    const origText = authSubmit.textContent;
    authSubmit.disabled = true;
    authSubmit.textContent = authMode === 'login' ? 'Вход...' : 'Регистрация...';
    authSubmit.style.opacity = '0.6';
    authError.style.display = 'none';
    try {
        const resp = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({email, password}),
            credentials: 'same-origin',
        });
        const data = await resp.json();
        if (resp.ok) {
            currentUser = data.user;
            updateAuthUI();
            hideAuthModal();
            viewMode === 'favorites' ? fetchFavorites() : fetchNews();
        } else {
            authError.textContent = data.error || 'Ошибка';
            authError.style.display = 'block';
        }
    } catch (e) {
        authError.textContent = 'Нет соединения с сервером';
        authError.style.display = 'block';
    } finally {
        authSubmit.disabled = false;
        authSubmit.textContent = origText;
        authSubmit.style.opacity = '';
    }
});

async function logout() {
    await fetch('/api/auth/logout', {method: 'POST', credentials: 'same-origin'});
    currentUser = null;
    updateAuthUI();
    viewMode === 'favorites' ? fetchFavorites() : fetchNews();
}

function updateAuthUI() {
    if (currentUser) {
        authBtn.textContent = '👤 ' + currentUser.email.split('@')[0];
        authBtn.title = currentUser.email + ' · нажмите чтобы выйти';
        authBtn.classList.add('active');
    } else {
        authBtn.textContent = '👤 Войти';
        authBtn.title = '';
        authBtn.classList.remove('active');
    }
}

// Проверяем авторизацию при загрузке
(async function initAuth() {
    try {
        const resp = await fetch('/api/auth/me', {credentials: 'same-origin'});
        const data = await resp.json();
        if (data.authenticated) {
            currentUser = data.user;
            updateAuthUI();
            startTokenKeepAlive();
        }
    } catch(e) {}
})();

// ── Token refresh ──────────────────────────────────────────────
async function refreshToken() {
    try {
        const resp = await fetch('/api/auth/refresh', {
            method: 'POST',
            credentials: 'same-origin',
        });
        const data = await resp.json();
        return resp.ok && data.ok;
    } catch(e) {
        return false;
    }
}

// Фоновая поддержка сессии: раз в 10 минут
let keepAliveInterval = null;
function startTokenKeepAlive() {
    if (keepAliveInterval) clearInterval(keepAliveInterval);
    keepAliveInterval = setInterval(async () => {
        if (!currentUser) { clearInterval(keepAliveInterval); return; }
        const ok = await refreshToken();
        if (!ok) {
            currentUser = null;
            updateAuthUI();
            clearInterval(keepAliveInterval);
        }
    }, 10 * 60 * 1000); // каждые 10 минут
}

// fetch с авто-рефрешем при 401
async function fetchWithAuth(url, options = {}) {
    let resp = await fetch(url, { ...options, credentials: 'same-origin' });
    if (resp.status === 401 && currentUser) {
        const refreshed = await refreshToken();
        if (refreshed) {
            resp = await fetch(url, { ...options, credentials: 'same-origin' });
        } else {
            currentUser = null;
            updateAuthUI();
        }
    }
    return resp;
}

// ── Яндекс ID ──────────────────────────────────────────────────
async function loginYandex() {
    try {
        const resp = await fetch('/api/auth/yandex/login');
        const data = await resp.json();
        if (data.url) {
            window.location.href = data.url;
        } else {
            authError.textContent = data.error || 'Яндекс ID не настроен';
            authError.style.display = 'block';
        }
    } catch(e) {
        authError.textContent = 'Ошибка соединения';
        authError.style.display = 'block';
    }
}

const list = document.getElementById('newsList');
const API_BASE = '/api';
let viewMode = 'news'; // 'news' | 'favorites'
const favToggle = document.getElementById('favToggle');
const headerSource = document.getElementById('headerSource');

// ── Skeleton loader ──────────────────────────────────────────
function showSkeletons() {
    let html = '';
    for (let i = 0; i < 4; i++) {
        html += `
        <div class="card skeleton">
            <div class="card-row">
                <div class="sk-img"></div>
                <div class="card-body">
                    <div class="sk-line wide"></div>
                    <div class="sk-line medium"></div>
                    <div class="sk-line narrow"></div>
                </div>
            </div>
        </div>`;
    }
    list.innerHTML = html;
}

// ── Error state ──────────────────────────────────────────────
function showError(msg) {
    list.innerHTML = `
        <div class="state">
            <div class="state-icon">⚠️</div>
            <p class="state-text">${msg}</p>
            <span class="state-retry" role="button" tabindex="0"
                  data-action="retry">Попробовать снова</span>
        </div>`;
}

// ── Empty state ──────────────────────────────────────────────
function showEmpty() {
    list.innerHTML = `
        <div class="state">
            <div class="state-icon">📭</div>
            <p class="state-text">Новостей пока нет</p>
            <span class="state-retry" role="button" tabindex="0"
                  data-action="retry">Обновить</span>
        </div>`;
}

// ── Date formatting ──────────────────────────────────────────
function formatDate(pubDate) {
    if (!pubDate) return '';
    const d = new Date(pubDate);
    if (isNaN(d.getTime())) return pubDate;
    const day = d.getDate();
    const mo = months[d.getMonth()];
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${day} ${mo}, ${hh}:${mm}`;
}

// ── Fetch & render (JSON from proxy) ──────────────────────────
async function fetchNews() {
    showSkeletons();
    document.getElementById('newsList').setAttribute('aria-live', 'polite');

    try {
        const resp = await fetch(API_BASE + '/news');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const articles = await resp.json();

        if (!Array.isArray(articles) || articles.length === 0) {
            showEmpty();
            return;
        }

        renderArticles(articles);

    } catch (err) {
        console.error('Fetch error:', err);
        showError('Не удалось загрузить новости. Проверьте подключение.');
    }
}

// ── Render articles ──────────────────────────────────────────
function renderArticles(articles) {
    if (articles.length === 0) { showEmpty(); return; }

    let html = '';
    articles.forEach(item => {
        const imgHtml = item.enclosureUrl
            ? `<img class="card-image" src="${escapeHtml(item.enclosureUrl)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
            : `<div class="card-image">📰</div>`;

        // Эмоциональный бейдж: rgba-фон с отдельной прозрачностью, тёмный текст на светлых цветах
        const label = item.emotion_label || '—';
        const strength = item.emotion_strength || 0;
        const emoBadge = label !== '—'
            ? buildEmotionBadge(label, strength)
            : '';

        const favIcon = item.is_favorited ? '★' : '☆';
        const favClass = item.is_favorited ? 'fav-btn active' : 'fav-btn';

        html += `
        <article class="card" tabindex="0"
                 data-url="${escapeHtml(item.link)}"
                 aria-label="Читать статью: ${escapeHtml(item.title)}">
            <div class="card-row">
                ${imgHtml}
                <div class="card-body">
                    <h2 class="card-title">${escapeHtml(item.title)}</h2>
                    <p class="card-summary">${escapeHtml(item.desc)}</p>
                    <div class="card-meta">
                        ${emoBadge}
                        <span>Ведомости</span>
                        <span>${formatDate(item.pubDate)}</span>
                        <span class="card-external">↗</span>
                    </div>
                    <a class="card-read" href="${escapeHtml(item.link)}" target="_blank" rel="noopener">Читать →</a>
                </div>
                <button class="${favClass}" data-link="${escapeHtml(item.link)}"
                        aria-label="${item.is_favorited ? 'Убрать из избранного' : 'Добавить в избранное'}"
                        title="${item.is_favorited ? 'В избранном' : 'Добавить в избранное'}">
                    ${favIcon}
                </button>
            </div>
        </article>`;
    });

    list.innerHTML = html;

    // Навешиваем обработчики: клик по карточке → открыть статью
    document.querySelectorAll('.card[data-url]').forEach(card => {
        card.addEventListener('click', (e) => {
            // Не перехватываем клик по кнопке избранного и по ссылке «Читать →»
            if (e.target.closest('.fav-btn') || e.target.closest('.card-read')) return;
            const url = card.dataset.url;
            if (url) window.open(url, '_blank', 'noopener');
        });
    });

    // Обработчики для кнопок избранного
    document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const link = btn.dataset.link;
            const isActive = btn.classList.contains('active');

            try {
                btn.disabled = true;
                const method = isActive ? 'DELETE' : 'POST';
                const resp = await fetchWithAuth(API_BASE + '/favorite', {
                    method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({link}),
                    credentials: 'same-origin',
                });
                if (resp.ok) {
                    btn.classList.toggle('active');
                    btn.textContent = isActive ? '☆' : '★';
                    btn.setAttribute('aria-label', isActive ? 'Добавить в избранное' : 'Убрать из избранного');
                    btn.title = isActive ? 'Добавить в избранное' : 'В избранном';
                } else if (resp.status === 401) {
                    showAuthModal();
                }
            } catch (err) {
                console.error('Favorite error:', err);
            } finally {
                btn.disabled = false;
            }

            // debounce: убираем disabled через 300 мс на всякий случай
            setTimeout(() => { try { btn.disabled = false; } catch(e) {} }, 300);
        });
    });
}

// ── Favorites ─────────────────────────────────────────────
async function fetchFavorites() {
    showSkeletons();
    try {
        const resp = await fetchWithAuth(API_BASE + '/favorites');
        if (resp.status === 401) {
            showAuthModal();
            return;
        }
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const articles = await resp.json();
        if (!Array.isArray(articles) || articles.length === 0) {
            showFavoritesEmpty();
            return;
        }
        renderArticles(articles);
    } catch (err) {
        console.error('Favorites fetch error:', err);
        showError('Не удалось загрузить избранное.');
    }
}

function showFavoritesEmpty() {
    list.innerHTML = `
        <div class="state">
            <div class="state-icon">☆</div>
            <p class="state-text">В избранном пока пусто</p>
            <p style="font-size:12px;color:var(--sub);margin-top:4px">Нажмите ☆ на карточке новости, чтобы добавить</p>
            <span class="state-retry" role="button" tabindex="0"
                  data-action="show-news">← Ко всем новостям</span>
        </div>`;
}

function toggleView() {
    if (viewMode === 'news') {
        viewMode = 'favorites';
        favToggle.textContent = '★ Лента';
        favToggle.classList.add('active');
        favToggle.setAttribute('aria-pressed', 'true');
        headerSource.textContent = 'Избранное';
        fetchFavorites();
    } else {
        viewMode = 'news';
        favToggle.textContent = '☆ Избранное';
        favToggle.classList.remove('active');
        favToggle.setAttribute('aria-pressed', 'false');
        headerSource.textContent = 'Ведомости · Новости';
        fetchNews();
    }
}

// ── Event delegation for retry / back buttons ───────────────
list.addEventListener('click', (e) => {
    const action = e.target.closest('[data-action]');
    if (!action) return;
    const cmd = action.dataset.action;
    if (cmd === 'retry') {
        viewMode === 'favorites' ? fetchFavorites() : fetchNews();
    } else if (cmd === 'show-news') {
        toggleView();
    }
});

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Color helpers ─────────────────────────────────────────────
function hexToRgb(hex) {
    const h = hex.replace('#', '');
    return {
        r: parseInt(h.substring(0, 2), 16),
        g: parseInt(h.substring(2, 4), 16),
        b: parseInt(h.substring(4, 6), 16),
    };
}

function getLuminance(hex) {
    const {r, g, b} = hexToRgb(hex);
    const rs = r / 255, gs = g / 255, bs = b / 255;
    const toLinear = (c) => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
    return 0.2126 * toLinear(rs) + 0.7152 * toLinear(gs) + 0.0722 * toLinear(bs);
}

function buildEmotionBadge(label, strength) {
    const hex = getEmotionColor(label);
    const alpha = 0.25 + strength * 0.06;
    const {r, g, b} = hexToRgb(hex);
    const luminance = getLuminance(hex);
    // На светлых фонах (luminance > 0.6) используем тёмный текст
    const textColor = luminance > 0.6 ? '#1D1D1F' : '#FFFFFF';
    const bg = `rgba(${r},${g},${b},${alpha.toFixed(2)})`;
    return `<span class="emotion-badge"
            style="background:${bg};color:${textColor}"
            title="Эмоция: ${escapeHtml(label)} · сила ${strength}/10">${escapeHtml(label)}</span>`;
}

// ── Emotion color mapping ─────────────────────────────────────
function getEmotionColor(label) {
    const map = {
        'позитив': '#34C759',
        'негатив': '#FF3B30',
        'тревога': '#FF9F0A',
        'надежда': '#5AC8FA',
        'нейтрально': '#8E8E93',
        'гнев': '#FF3B30',
        'гордость': '#AF52DE',
        'страх': '#FF375F',
        'удивление': '#FFD60A',
        'интерес': '#007AFF',
    };
    return map[label] || '#8E8E93';
}

// ── Start ────────────────────────────────────────────────────
favToggle.addEventListener('click', toggleView);
fetchNews();
</script>
