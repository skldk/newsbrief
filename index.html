<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsBrief — Ведомости / Рынки</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #F5F5F7;
            --card: #FFFFFF;
            --text: #1D1D1F;
            --sub: #6E6E73;
            --accent: #007AFF;
            --divider: #E5E5EA;
            --tag-bg: #F2F2F7;
            --tag-fg: #515154;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
            --radius: 16px;
            --skeleton: #E5E5EA;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #1C1C1E;
                --card: #2C2C2E;
                --text: #F5F5F7;
                --sub: #98989D;
                --divider: #3A3A3C;
                --tag-bg: #3A3A3C;
                --tag-fg: #AEAEB2;
                --shadow: 0 1px 3px rgba(0,0,0,0.3);
                --skeleton: #3A3A3C;
            }
        }

        body {
            font-family: -apple-system, 'Helvetica Neue', 'SF Pro Text', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            position: sticky; top: 0; z-index: 10;
            background: rgba(245,245,247,0.82);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--divider);
            padding: 12px 16px;
        }
        @media (prefers-color-scheme: dark) {
            .header { background: rgba(28,28,30,0.82); }
        }

        .header-inner {
            max-width: 720px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 8px;
        }

        .logo { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; color: var(--text); }
        .logo span { color: var(--accent); }

        .header-right { display: flex; align-items: center; gap: 12px; }

        .header-source { font-size: 12px; color: var(--sub); background: var(--tag-bg); padding: 3px 10px; border-radius: 6px; }
        .header-date { font-size: 13px; color: var(--sub); }

        /* ── Main ───────────────────────────────────────────── */
        .main { max-width: 720px; margin: 0 auto; padding: 24px 16px 48px; }

        /* ── Card ───────────────────────────────────────────── */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            border: 0.5px solid var(--divider);
        }
        .card:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .card:active { transform: scale(0.995); }
        @media (prefers-color-scheme: dark) {
            .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
        }

        .card-row { display: flex; gap: 16px; align-items: flex-start; }

        .card-image {
            width: 72px; min-width: 72px; height: 72px; border-radius: 10px;
            background: var(--divider);
            flex-shrink: 0;
            object-fit: cover;
            font-size: 28px; display: flex; align-items: center; justify-content: center;
            color: var(--sub);
        }

        .card-body { flex: 1; min-width: 0; }

        .card-tag {
            display: inline-block;
            font-size: 11px; font-weight: 600; letter-spacing: 0.3px;
            text-transform: uppercase;
            color: var(--tag-fg); background: var(--tag-bg);
            padding: 2px 8px; border-radius: 6px;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 16px; font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 8px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-summary {
            font-size: 13px; color: var(--sub);
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .card-meta {
            font-size: 11px; color: var(--sub);
            display: flex; gap: 12px;
        }

        /* ── Emotion badge (minimal) ────────────────────────── */
        .emotion-badge {
            display: inline-block; vertical-align: middle;
            font-size: 10px; font-weight: 600; letter-spacing: 0.1px;
            color: var(--emo-fg, #6E6E73);
            background: var(--emo-bg, #E5E5EA);
            padding: 2px 8px; border-radius: 6px;
            margin-left: 6px;
            cursor: help;
        }

        /* ── Card external link indicator ───────────────────── */
        /* ── Card external link indicator ───────────────────── */
        .card-external { display: none; }
        .card:hover .card-external,
        .card:focus-within .card-external { display: inline; }

        /* ── Favorite button ───────────────────────────────── */
        .fav-btn {
            background: none; border: none; cursor: pointer;
            font-size: 15px; padding: 2px; line-height: 1;
            opacity: 0.4; transition: opacity 0.15s, transform 0.15s;
            vertical-align: middle; margin-right: 4px;
        }
        .card:hover .fav-btn,
        .card:focus-within .fav-btn { opacity: 1; }
        .fav-btn:hover { transform: scale(1.2); opacity: 1; }
        .fav-btn.active { opacity: 1; }
        .fav-btn:active { transform: scale(0.9); }

        /* ── Skeleton loading ───────────────────────────────── */
        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: calc(200px + 100%) 0; }
        }
        .skeleton .sk-img { width: 72px; height: 72px; border-radius: 10px; background: var(--skeleton); }
        .skeleton .sk-line { height: 12px; border-radius: 6px; margin-bottom: 8px; }
        .skeleton .sk-line.wide { width: 70%; }
        .skeleton .sk-line.medium { width: 50%; }
        .skeleton .sk-line.narrow { width: 30%; }
        .skeleton .sk-img, .skeleton .sk-line { background: linear-gradient(90deg, var(--skeleton) 25%, var(--divider) 50%, var(--skeleton) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }

        /* ── Empty / Error ──────────────────────────────────── */
        .state { text-align: center; padding: 80px 20px; color: var(--sub); }
        .state-icon { font-size: 44px; margin-bottom: 12px; }
        .state-text { font-size: 15px; margin-bottom: 8px; }
        .state-retry { color: var(--accent); cursor: pointer; font-size: 14px; font-weight: 600; }
        .state-retry:hover { text-decoration: underline; }

        /* ── Footer ─────────────────────────────────────────── */
        .footer { text-align: center; padding: 0 16px 40px; color: var(--sub); font-size: 11px; }
        .footer a { color: var(--accent); text-decoration: none; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 480px) {
            .header { padding: 12px 16px; }
            .main { padding: 16px 16px 40px; }
            .card { padding: 16px; border-radius: 12px; }
            .card-image { width: 56px; min-width: 56px; height: 56px; font-size: 22px; }
            .card-title { font-size: 14px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo">News<span>Brief</span></div>
        <div class="header-right">
            <span class="header-source">Ведомости · Рынки</span>
            <span class="header-date" id="headerDate"></span>
        </div>
    </div>
</header>

<main class="main" id="newsList"></main>

<footer class="footer">
    Данные из <a href="https://www.vedomosti.ru/rss/rubric/finance/markets" target="_blank" rel="noopener">RSS Ведомости</a> · обновляется при загрузке
</footer>

<script>
// ── Header date ──────────────────────────────────────────────
const now = new Date();
const months = ['января','февраля','марта','апреля','мая','июня',
                'июля','августа','сентября','октября','ноября','декабря'];
document.getElementById('headerDate').textContent =
    `${now.getDate()} ${months[now.getMonth()]}, ${now.getFullYear()}`;

const list = document.getElementById('newsList');
const API_BASE = '/api';
const MAX_ITEMS = 10;

// ── Skeleton loader ──────────────────────────────────────────
function showSkeletons() {
    let html = '';
    for (let i = 0; i < 4; i++) {
        html += `
        <div class="card skeleton">
            <div class="card-row">
                <div class="sk-img"></div>
                <div class="card-body">
                    <div class="sk-line wide"></div>
                    <div class="sk-line medium"></div>
                    <div class="sk-line narrow"></div>
                </div>
            </div>
        </div>`;
    }
    list.innerHTML = html;
}

// ── Error state ──────────────────────────────────────────────
function showError(msg) {
    list.innerHTML = `
        <div class="state">
            <div class="state-icon">⚠️</div>
            <p class="state-text">${msg}</p>
            <span class="state-retry" onclick="location.reload()">Попробовать снова</span>
        </div>`;
}

// ── Empty state ──────────────────────────────────────────────
function showEmpty() {
    list.innerHTML = `
        <div class="state">
            <div class="state-icon">📭</div>
            <p class="state-text">Новостей пока нет</p>
        </div>`;
}

// ── Date formatting ──────────────────────────────────────────
function formatDate(pubDate) {
    if (!pubDate) return '';
    const d = new Date(pubDate);
    if (isNaN(d.getTime())) return pubDate;
    const day = d.getDate();
    const mo = months[d.getMonth()];
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return `${day} ${mo}, ${hh}:${mm}`;
}

// ── Fetch & render (JSON from proxy) ──────────────────────────
async function fetchNews() {
    showSkeletons();

    try {
        const resp = await fetch(API_BASE + '/news');
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const articles = await resp.json();

        if (!Array.isArray(articles) || articles.length === 0) {
            showEmpty();
            return;
        }

        renderArticles(articles);

    } catch (err) {
        console.error('Fetch error:', err);
        showError('Не удалось загрузить новости. Проверьте подключение.');
    }
}

// ── Render articles ──────────────────────────────────────────
function renderArticles(articles) {
    if (articles.length === 0) { showEmpty(); return; }

    let html = '';
    articles.forEach(item => {
        const imgHtml = item.enclosureUrl
            ? `<img class="card-image" src="${escapeHtml(item.enclosureUrl)}" alt="" loading="lazy" onerror="this.style.visibility='hidden'">`
            : `<div class="card-image">📰</div>`;

        // Эмоциональный бейдж: один чип, насыщенность фона = сила
        const label = item.emotion_label || '—';
        const strength = item.emotion_strength || 0;
        const emoColor = getEmotionColor(label);
        const emoBadge = label !== '—' ? (() => {
            const c = getEmotionColor(label);
            const alpha = Math.round(25 + strength * 15).toString(16).padStart(2, '0');
            return `<span class="emotion-badge"
                          style="--emo-fg:${c};--emo-bg:${c}${alpha}"
                          title="Эмоция: ${label} · сила ${strength}/10">${label}</span>`;
        })() : '';

        const favIcon = item.is_favorited ? '★' : '☆';
        const favClass = item.is_favorited ? 'fav-btn active' : 'fav-btn';

        html += `
        <article class="card" role="button" tabindex="0"
                 data-url="${escapeHtml(item.link)}"
                 data-link="${escapeHtml(item.link)}"
                 aria-label="Читать статью: ${escapeHtml(item.title)}">
            <div class="card-row">
                ${imgHtml}
                <div class="card-body">
                    <span class="card-tag">${escapeHtml(item.category)}</span>
                    <h2 class="card-title">${escapeHtml(item.title)}</h2>
                    <p class="card-summary">${escapeHtml(item.desc)}</p>
                    <div class="card-meta">
                        ${emoBadge}
                        <span>Ведомости</span>
                        <span>${formatDate(item.pubDate)}</span>
                        <span class="card-external">↗</span>
                    </div>
                </div>
                <button class="${favClass}" data-link="${escapeHtml(item.link)}"
                        aria-label="${item.is_favorited ? 'Убрать из избранного' : 'Добавить в избранное'}"
                        title="${item.is_favorited ? 'В избранном' : 'Добавить в избранное'}">
                    ${favIcon}
                </button>
            </div>
        </article>`;
    });

    list.innerHTML = html;

    // Навешиваем обработчики: клик по карточке → открыть статью
    document.querySelectorAll('.card[data-url]').forEach(card => {
        card.addEventListener('click', (e) => {
            // Не перехватываем клик по кнопке избранного
            if (e.target.closest('.fav-btn')) return;
            const url = card.dataset.url;
            if (url) window.open(url, '_blank', 'noopener');
        });
    });

    // Обработчики для кнопок избранного
    document.querySelectorAll('.fav-btn').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const link = btn.dataset.link;
            const isActive = btn.classList.contains('active');

            try {
                const method = isActive ? 'DELETE' : 'POST';
                const resp = await fetch(API_BASE + 'favorite', {
                    method,
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({link}),
                });
                if (resp.ok) {
                    btn.classList.toggle('active');
                    btn.textContent = isActive ? '☆' : '★';
                    btn.setAttribute('aria-label', isActive ? 'Добавить в избранное' : 'Убрать из избранного');
                    btn.title = isActive ? 'Добавить в избранное' : 'В избранном';
                }
            } catch (err) {
                console.error('Favorite error:', err);
            }
        });
    });
}

function openArticle(url) {
    if (url) window.open(url, '_blank', 'noopener');
}

function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// ── Emotion color mapping ─────────────────────────────────────
function getEmotionColor(label) {
    const map = {
        'позитив': '#34C759',
        'негатив': '#FF3B30',
        'тревога': '#FF9F0A',
        'надежда': '#5AC8FA',
        'нейтрально': '#8E8E93',
        'гнев': '#FF3B30',
        'гордость': '#AF52DE',
        'страх': '#FF375F',
        'удивление': '#FFD60A',
        'интерес': '#007AFF',
    };
    return map[label] || '#8E8E93';
}

// ── Start ────────────────────────────────────────────────────
fetchNews();
</script>

</body>
</html>
